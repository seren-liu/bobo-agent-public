events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    resolver 127.0.0.11 ipv6=off valid=30s;
    include /etc/nginx/conf.d/bobo-upstreams.conf;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 444;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name bobo-agent.com www.bobo-agent.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://bobo-agent.com$request_uri;
        }
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/bobo-agent.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bobo-agent.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        return 444;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name bobo-agent.com;

        ssl_certificate     /etc/letsencrypt/live/bobo-agent.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bobo-agent.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API 代理（含 SSE 支持）
        location /bobo/ {
            proxy_pass         $bobo_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-Id $http_x_request_id;

            proxy_set_header   Connection '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        location / {
            root  /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name www.bobo-agent.com;

        ssl_certificate     /etc/letsencrypt/live/bobo-agent.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bobo-agent.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        return 301 https://bobo-agent.com$request_uri;
    }
}
