events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    resolver 127.0.0.11 ipv6=off valid=30s;
    include /etc/nginx/conf.d/bobo-upstreams.conf;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 444;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name bobo-agent.com www.bobo-agent.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 http://bobo-agent.com$request_uri;
        }
    }
}
